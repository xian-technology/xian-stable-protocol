name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - name: Sync dependencies
        run: uv sync --locked --group dev
      - name: Run tests
        run: uv run pytest -q
