name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out xian-stable-protocol
        uses: actions/checkout@v4
        with:
          path: xian-stable-protocol

      - name: Check out xian-contracting
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/xian-contracting
          ref: main
          path: xian-contracting

      - name: Use matching xian-contracting branch when available
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ github.head_ref || github.ref_name }}"
          REMOTE="https://github.com/${{ github.repository_owner }}/xian-contracting"
          if git ls-remote --exit-code --heads "$REMOTE" "$BRANCH" >/dev/null 2>&1; then
            git -C xian-contracting fetch --depth=1 origin "$BRANCH"
            git -C xian-contracting checkout -B "$BRANCH" FETCH_HEAD
          fi

      - name: Check out xian-py
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/xian-py
          ref: main
          path: xian-py

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - name: Sync dependencies
        working-directory: xian-stable-protocol
        run: uv sync --locked --group dev
      - name: Audit Python VM contract compatibility
        working-directory: xian-stable-protocol
        run: |
          uv run --project ../xian-contracting python \
            ../xian-contracting/scripts/audit_python_vm_compatibility.py \
            ./contracts \
            --fail-on-issues
      - name: Run tests
        working-directory: xian-stable-protocol
        run: uv run pytest -q
